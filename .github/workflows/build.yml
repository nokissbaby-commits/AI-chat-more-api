name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - run: |
        npm install -g react-native-cli
        
    - name: Build
      run: |
        cd claude-chat-app
        npm install
        cd android
        ./gradlew clean assembleRelease
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: claude-chat-app/android/app/build/outputs/apk/release/app-release.apk
