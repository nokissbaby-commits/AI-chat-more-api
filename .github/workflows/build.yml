name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - uses: android-actions/setup-android@v3
    
    - name: Install dependencies
      run: |
        cd claude-chat-app
        npm install
    
    - name: Generate keystore
      run: |
        cd claude-chat-app
        keytool -genkey -v -keystore claude-chat-app.keystore \
          -keyalg RSA -keysize 2048 -validity 10000 -alias claude-key \
          -storepass 123456 -keypass 123456 \
          -dname "CN=Claude Chat,OU=Dev,O=Claude,L=Shanghai,S=Shanghai,C=CN"
    
    - name: Build APK
      run: |
        cd claude-chat-app/android
        ./gradlew clean
        ./gradlew assembleRelease
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: claude-chat-apk
        path: claude-chat-app/android/app/build/outputs/apk/release/app-release.apk
